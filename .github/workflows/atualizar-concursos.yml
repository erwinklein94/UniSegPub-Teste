name: Atualizar Concursos - Motor Genérico

on:
  workflow_dispatch:
    inputs:
      instituicao:
        description: 'Qual instituição atualizar? Comece uma por vez para controlar custos.'
        required: true
        default: 'pmesp'
        type: choice
        options:
          - 'pmesp'
          - 'pcsp'
          - 'prf'
          - 'prioridade_1'
          - 'todas_configuradas'
      limite:
        description: 'Limite de instituições quando usar prioridade_1 ou todas_configuradas'
        required: false
        default: '1'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '5'
          - '10'
      forcar_atualizacao:
        description: 'Forçar chamada da OpenAI mesmo sem mudança detectada?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      usar_web_search:
        description: 'Usar web_search da OpenAI? Mais caro. Deixe false no modo econômico.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    # 07h00 de Brasília, segunda-feira. GitHub Actions usa UTC.
    # Roda só a prioridade 1 com limite 1 por padrão; aumente depois que validar custos.
    - cron: '0 10 * * 1'

permissions:
  contents: write

jobs:
  atualizar-concursos:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Rodar motor genérico de concursos
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-5.4-nano' }}
          INSTITUICAO_ID: ${{ github.event.inputs.instituicao || 'prioridade_1' }}
          LIMITE_INSTITUICOES: ${{ github.event.inputs.limite || '1' }}
          FORCAR_ATUALIZACAO: ${{ github.event.inputs.forcar_atualizacao || 'false' }}
          USAR_WEB_SEARCH: ${{ github.event.inputs.usar_web_search || 'false' }}
          DIAS_REVALIDACAO_COMPLETA: '14'
          MAX_PAGINAS_OFICIAIS: '6'
          MAX_CARACTERES_POR_PAGINA: '4500'
        run: node scripts/atualizar-concursos.mjs

      - name: Salvar alterações no repositório
        run: |
          if [ -z "$(git status --porcelain data/concursos)" ]; then
            echo "Nenhuma alteração detectada em data/concursos."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/concursos/*.json
          git commit -m "Atualiza concursos pelo motor genérico"
          git push
